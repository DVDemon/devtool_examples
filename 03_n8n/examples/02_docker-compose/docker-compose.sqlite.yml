
services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:1.121.3
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      N8N_SECURE_COOKIE: false             
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678/}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env}
      TZ: ${TZ:-Europe/Moscow}
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
